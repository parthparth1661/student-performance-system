{% extends 'admin/layout.html' %}

{% block content %}
<div class="row justify-content-center py-4">
    <div class="col-lg-7">
        <div class="card border-0 shadow-sm rounded-4 p-5">
            <div class="text-center mb-5">
                <div class="bg-success-soft text-success rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 64px; height: 64px;">
                    <i class="fas fa-user-tie fa-2x"></i>
                </div>
                <h2 class="fw-bold text-dark mb-1">Add Faculty Member</h2>
                <p class="text-muted small">Initialize a new faculty profile in the academic staff registry.</p>
            </div>

            <form action="{{ url_for('admin.add_faculty') }}" method="POST" class="row g-4">
                <div class="col-12">
                    <label class="form-label small fw-bold text-uppercase text-muted letter-spacing-sm">Full Name</label>
                    <input type="text" name="faculty_name" class="form-control bg-light border-0 py-2 px-3 rounded-3" placeholder="e.g. Dr. Sarah Johnson" required>
                </div>
                <div class="col-md-12">
                    <label class="form-label small fw-bold text-uppercase text-muted letter-spacing-sm">Email Address</label>
                    <input type="email" name="email" class="form-control bg-light border-0 py-2 px-3 rounded-3" placeholder="sarah.j@university.edu" required>
                </div>
                <div class="col-md-12">
                    <label class="form-label small fw-bold text-uppercase text-muted letter-spacing-sm">Department</label>
                    <select name="department" class="form-select bg-light border-0 py-2 px-3 rounded-3" required>
                        <option value="">Select Dept</option>
                        <option value="BCA">BCA</option>
                        <option value="MCA">MCA</option>
                        <option value="B.TECH">B.TECH</option>
                        <option value="M.TECH">M.TECH</option>
                        <option value="MBA">MBA</option>
                    </select>
                </div>
                <div class="col-12 mt-5">
                    <div class="d-flex gap-3">
                        <button type="submit" class="btn btn-primary px-5 py-2 rounded-pill shadow-sm fw-bold">Register Faculty</button>
                        <a href="{{ url_for('admin.view_faculty') }}" class="btn btn-light px-5 py-2 rounded-pill border fw-bold text-muted">Cancel</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
