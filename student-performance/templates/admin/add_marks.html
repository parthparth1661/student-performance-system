{% extends 'admin/layout.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card border-0 shadow-sm overflow-hidden">
            <div class="card-header bg-white py-3 border-0">
                <div class="d-flex align-items-center">
                    <div class="icon-shape bg-info bg-opacity-10 text-info rounded-3 p-3 me-3">
                        <i class="fas fa-file-signature"></i>
                    </div>
                    <div>
                        <h5 class="mb-0 fw-bold">Record Student Marks</h5>
                        <p class="text-muted small mb-0">Enter assessment scores for a specific student and subject.</p>
                    </div>
                </div>
            </div>
            <div class="card-body p-4 pt-2">
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label fw-medium">Student Enrollment No</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i
                                    class="fas fa-id-card text-muted"></i></span>
                            <input type="text" name="roll_no" class="form-control" required
                                placeholder="Enter student enrollment no (e.g., ENR001)">
                        </div>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Subject</label>
                            <select name="subject" class="form-select text-muted" required>
                                <option value="" selected disabled>Select Subject</option>
                                {% for subject in subjects %}
                                <option value="{{ subject }}">{{ subject }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Marks (0-100)</label>
                            <input type="number" name="marks" class="form-control" required min="0" max="100"
                                placeholder="Score">
                        </div>
                    </div>
                    <div class="row g-3 mt-2">
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Exam Type</label>
                            <select name="exam_type" id="exam_type" class="form-select text-muted" required>
                                <option value="" selected disabled>Select Type</option>
                                <option value="Internal">Internal</option>
                                <option value="External">External</option>
                                <option value="Practical">Practical</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Exam Date</label>
                            <input type="date" name="exam_date" class="form-control" required>
                        </div>
                    </div>
                    <div class="mt-4 pt-3 d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4 py-2">
                            <i class="fas fa-save me-2"></i>Save Record
                        </button>
                        <a href="{{ url_for('admin.view_marks') }}" class="btn btn-light px-4 py-2 text-secondary">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.querySelector('input[name="roll_no"]').addEventListener('blur', function () {
        const rollNo = this.value.trim();
        if (!rollNo) return;

        fetch(`/admin/get_student_dept/${rollNo}`)
            .then(response => response.json())
            .then(data => {
                const practicalOption = document.querySelector('#exam_type option[value="Practical"]');
                const examSelect = document.querySelector('#exam_type');

                if (data.department === 'MBA') {
                    practicalOption.disabled = true;
                    if (examSelect.value === 'Practical') {
                        examSelect.value = '';
                    }
                } else {
                    practicalOption.disabled = false;
                }
            })
            .catch(err => console.log('Error fetching student dept:', err));
    });
</script>
{% endblock %}
