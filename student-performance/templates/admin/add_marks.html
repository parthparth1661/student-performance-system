{% extends 'admin/layout.html' %}

{% block content %}
<div class="mb-4">
    <h2 class="fw-bold mb-0 text-dark">Add New Marks Record</h2>
    <p class="text-muted">Directly insert academic data into SPDA database</p>
</div>

<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card border-0 shadow-sm rounded-4 p-4">
            <form action="{{ url_for('admin.add_marks') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary">Search Student (Enrollment No)</label>
                    <select name="enrollment_no" class="form-select rounded-pill border-light bg-light" required>
                         <option value="">-- Choose Student --</option>
                         {% for s in students %}<option value="{{ s.enrollment_no }}">{{ s.enrollment_no }} - {{ s.name }}</option>{% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary">Course Subject</label>
                    <select name="subject_id" class="form-select rounded-pill border-light bg-light" required>
                         <option value="">-- Choose Subject --</option>
                         {% for sub in subjects %}<option value="{{ sub.subject_id }}">{{ sub.subject_name }} ({{ sub.department }})</option>{% endfor %}
                    </select>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold text-secondary">Exam Component</label>
                        <select name="exam_type" class="form-select rounded-pill border-light bg-light" required>
                            <option value="Internal">Internal (30)</option>
                            <option value="External">External (70)</option>
                            <option value="Practical">Practical (50)</option>
                        </select>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label fw-bold text-secondary">Obtained</label>
                        <input type="number" name="marks_obtained" class="form-control rounded-pill border-light bg-light" required placeholder="0">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label fw-bold text-secondary">Total Max</label>
                        <input type="number" name="total_marks" class="form-control rounded-pill border-light bg-light" required placeholder="100" value="100">
                    </div>
                </div>
                <div class="mt-4 text-center">
                    <button type="submit" class="btn btn-primary px-5 rounded-pill shadow-lg py-3">
                         <i class="fas fa-plus me-2"></i>Add Record
                    </button>
                    <a href="{{ url_for('admin.view_marks') }}" class="btn btn-light px-4 rounded-pill py-3 ms-2">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
