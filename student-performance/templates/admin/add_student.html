{% extends 'admin/layout.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card border-0 shadow-sm overflow-hidden">
            <div class="card-header bg-white py-3 border-0">
                <div class="d-flex align-items-center">
                    <div class="icon-shape bg-primary bg-opacity-10 text-primary rounded-3 p-3 me-3">
                        <i class="fas fa-user-plus"></i>
                    </div>
                    <div>
                        <h5 class="mb-0 fw-bold">Add New Student</h5>
                        <p class="text-muted small mb-0">Fill in the details to register a new student.</p>
                    </div>
                </div>
            </div>
            <div class="card-body p-4 pt-2">
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Enrollment No</label>
                            <input type="text" name="roll_no" class="form-control" required placeholder="Ex: ENR001">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Student Name</label>
                            <input type="text" name="name" class="form-control" required placeholder="Ex: John Doe">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Email Address</label>
                            <input type="email" name="email" class="form-control" required
                                placeholder="Ex: john@example.com">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Department</label>
                            <select name="department" class="form-select" required>
                                <option value="" selected disabled>Select Department</option>
                                <option value="BCA">BCA</option>
                                <option value="MCA">MCA</option>
                                <option value="B.TECH">B.TECH</option>
                                <option value="M.TECH">M.TECH</option>
                                <option value="MBA">MBA</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Semester</label>
                            <select name="semester" class="form-select" required>
                                <option value="" selected disabled>Select Semester</option>
                                {% for i in range(1, 7) %}
                                <option value="{{ i }}">Semester {{ i }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="mt-4 pt-3 d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4 py-2">
                            <i class="fas fa-save me-2"></i>Save Student Information
                        </button>
                        <a href="{{ url_for('admin.view_students') }}" class="btn btn-light px-4 py-2 text-secondary">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
