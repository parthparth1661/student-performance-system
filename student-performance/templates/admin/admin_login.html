<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrator Login | SPDA Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --error-bg: #fef2f2;
            --error-text: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: var(--card);
            padding: 48px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            border: 1px solid var(--border);
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            background: #f1f0ff;
            color: var(--primary);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin: 0 auto 16px;
        }

        .login-header h2 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .login-header p {
            font-size: 14px;
            color: var(--text-sub);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }

        .forgot-link {
            font-size: 13px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            color: var(--text-sub);
            font-size: 16px;
            pointer-events: none;
        }

        input[type="email"], 
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            color: var(--text-main);
            background: #fff;
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            color: var(--text-sub);
            cursor: pointer;
            font-size: 14px;
            padding: 5px;
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: var(--primary);
        }

        .remember-row {
            display: flex;
            align-items: center;
            margin-bottom: 24px;
        }

        .remember-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            border: 1px solid var(--border);
            margin-right: 10px;
            cursor: pointer;
        }

        .remember-row label {
            text-transform: none;
            letter-spacing: normal;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .error-alert {
            background: var(--error-bg);
            color: var(--error-text);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 24px;
            border: 1px solid rgba(239, 68, 68, 0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .student-portal-link {
            text-align: center;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .student-portal-link a {
            font-size: 14px;
            color: var(--text-sub);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .student-portal-link a:hover {
            color: var(--primary);
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
                border-radius: 0;
                box-shadow: none;
                border: none;
                height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
            body { background: #fff; }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="logo-icon shadow-sm">
                <i class="fas fa-shield-halved"></i>
            </div>
            <h2>SPDA Admin Panel</h2>
            <p>Institutional Analytics Command Center</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="error-alert">
                    <i class="fas fa-circle-exclamation"></i>
                    {{ message }}
                </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('admin.login') }}" method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" name="email" placeholder="admin@spda.edu" required autofocus>
                </div>
            </div>

            <div class="form-group">
                <div class="label-row">
                    <label>Password</label>
                    <a href="#" class="forgot-link">Forgot?</a>
                </div>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" name="password" id="password" placeholder="••••••••" required onkeyup="checkCaps(event)">
                    <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                </div>
                <div id="capsWarning" style="display:none; color: #ef4444; font-size: 11px; font-weight: 700; margin-top: 8px; text-transform: uppercase;">
                    <i class="fas fa-keyboard me-1"></i> Warning: Caps Lock is ON
                </div>
            </div>

            <div class="remember-row">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember">Keep me signed in</label>
            </div>

            <button type="submit" class="btn-submit">
                <span>Authorize & Login</span>
                <i class="fas fa-arrow-right small"></i>
            </button>
        </form>

        <div class="student-portal-link">
            <a href="{{ url_for('student.login') }}">
                <i class="fas fa-user-graduate me-1 text-primary"></i> 
                Student Portal Access
            </a>
        </div>
    </div>
</div>

<script>
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#password');

    togglePassword.addEventListener('click', function (e) {
        // toggle the type attribute
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        // toggle the eye slash icon
        this.classList.toggle('fa-eye-slash');
    });

    // 🧱 LOADING STATE
    document.querySelector("form").addEventListener("submit", function() {
        const btn = document.querySelector(".btn-submit");
        const span = btn.querySelector("span");
        const icon = btn.querySelector("i");
        
        span.innerText = "Authorizing...";
        icon.className = "fas fa-spinner fa-spin ms-2";
        btn.style.opacity = "0.8";
        btn.style.pointerEvents = "none";
    });
    // 🧱 CAPS LOCK WARNING
    function checkCaps(e) {
        const warning = document.getElementById("capsWarning");
        if (e.getModifierState("CapsLock")) {
            warning.style.display = "block";
        } else {
            warning.style.display = "none";
        }
    }
</script>

</body>
</html>
