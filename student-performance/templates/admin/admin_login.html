<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | SPDA Academy</title>
    <!-- 🚀 BOOTSTRAP 5 & ICONS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- 🎨 MODERN TYPOGRAPHY -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --bg-gradient: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* 🌪️ DYNAMIC BACKGROUND ELEMENTS */
        .bg-shape {
            position: absolute;
            z-index: -1;
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.4;
            animation: pulse 10s infinite alternate;
        }

        .shape-1 {
            width: 400px;
            height: 400px;
            background: #4f46e5;
            top: -100px;
            right: -100px;
        }

        .shape-2 {
            width: 300px;
            height: 300px;
            background: #1e1b4b;
            bottom: -50px;
            left: -50px;
            animation-delay: -5s;
        }

        @keyframes pulse {
            0% {
                transform: scale(1) translate(0, 0);
            }

            100% {
                transform: scale(1.2) translate(30px, 30px);
            }
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            animation: entrance 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes entrance {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            padding: 40px;
            transition: var(--transition);
        }

        .login-card:hover {
            box-shadow: 0 35px 60px -12px rgba(0, 0, 0, 0.4);
        }

        .logo-box {
            width: 64px;
            height: 64px;
            background: #1e293b;
            color: white;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 24px;
            box-shadow: 0 8px 16px -4px rgba(30, 41, 59, 0.4);
        }

        .login-title {
            font-weight: 800;
            font-size: 1.75rem;
            color: #1e293b;
            margin-bottom: 8px;
            text-align: center;
        }

        .login-subtitle {
            font-size: 0.95rem;
            color: #64748b;
            text-align: center;
            margin-bottom: 32px;
        }

        /* 🔘 CUSTOM INPUTS */
        .input-group {
            background: #f1f5f9;
            border: 2px solid #f1f5f9;
            border-radius: 14px;
            transition: var(--transition);
            overflow: hidden;
        }

        .input-group:focus-within {
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .input-group-text {
            background: transparent !important;
            border: none !important;
            color: #94a3b8;
            padding-left: 16px;
            padding-right: 12px;
        }

        .input-group:focus-within .input-group-text {
            color: var(--primary);
        }

        .form-control {
            background: transparent !important;
            border: none !important;
            padding: 14px 16px 14px 0;
            font-weight: 500;
            color: #1e293b;
            box-shadow: none !important;
        }

        .form-control::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }

        #togglePassword {
            cursor: pointer;
            padding-right: 16px;
            transition: var(--transition);
        }

        #togglePassword:hover {
            color: var(--primary);
        }

        /* 🚀 LOGIN BUTTON */
        .btn-login {
            background: #1e293b;
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            padding: 14px;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 10px 15px -3px rgba(30, 41, 59, 0.3);
            transition: var(--transition);
        }

        .btn-login:hover {
            background: #334155;
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(30, 41, 59, 0.3);
            color: white;
        }

        .btn-login:active {
            transform: translateY(0);
        }

        /* ⚠️ ALERT STYLING */
        .alert-custom {
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 12px;
            border: none;
            margin-bottom: 24px;
        }

        .footer-text {
            text-align: center;
            margin-top: 32px;
            font-size: 0.85rem;
            color: #64748b;
        }

        .footer-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        .back-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 24px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            opacity: 0.8;
            transition: var(--transition);
        }

        .back-link:hover {
            opacity: 1;
            transform: translateX(-4px);
        }

        .forgot-link-small {
            display: block;
            text-align: right;
            font-size: 0.85rem;
            color: var(--primary);
            text-decoration: none;
            margin-top: -15px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .forgot-link-small:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div class="login-container">
        <div class="login-card shadow-lg">
            <div class="logo-box">
                <i class="bi bi-shield-lock-fill"></i>
            </div>
            <h3 class="login-title">Admin Login</h3>
            <p class="login-subtitle">Admin Login page</p>

            <!-- ⚠️ ERROR HANDLING -->
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ 'danger' if category == 'danger' else 'primary' }} alert-custom text-center animate__animated animate__shakeX"
                role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form action="{{ url_for('admin.login') }}" method="POST">
                <!-- Email Field -->
                <div class="mb-3">
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope-at-fill"></i></span>
                        <input type="email" class="form-control" name="email" placeholder="Admin Email" required
                            autofocus>
                    </div>
                </div>

                <!-- Password Field -->
                <div class="mb-4">
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" class="form-control" id="password" name="password"
                            placeholder="Key Password" required>
                        <span class="input-group-text" id="togglePassword">
                            <i class="bi bi-eye-slash-fill"></i>
                        </span>
                    </div>
                </div>

                <a href="/forgot_password" class="forgot-link-small">Forgot Credentials?</a>

                <!-- Login Button -->
                <button type="submit" class="btn btn-login">
                    Authorize Access <i class="bi bi-shield-check fs-5 ms-1"></i>
                </button>
            </form>


        </div>

        <a href="/" class="back-link">
           
        </a>
    </div>

    <!-- 🔑 PASSWORD TOGGLE LOGIC -->
    <script>
        const toggle = document.getElementById('togglePassword');
        const password = document.getElementById('password');

        toggle.addEventListener('click', function () {
            // Toggle the type attribute
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);

            // Toggle the icon
            const icon = this.querySelector('i');
            if (type === 'text') {
                icon.classList.remove('bi-eye-slash-fill');
                icon.classList.add('bi-eye-fill');
                icon.style.color = 'var(--primary)';
            } else {
                icon.classList.remove('bi-eye-fill');
                icon.classList.add('bi-eye-slash-fill');
                icon.style.color = '#94a3b8';
            }
        });

        // Simple Form Submission UX
        const form = document.querySelector('form');
        const loginBtn = document.querySelector('.btn-login');

        form.addEventListener('submit', function () {
            loginBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Validating...';
            loginBtn.classList.add('disabled');
        });
    </script>

</body>

</html>
