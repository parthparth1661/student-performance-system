{% extends 'admin/layout.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm rounded-4 text-center p-5">
            <img src="https://ui-avatars.com/api/?name={{ session.get('admin_email', 'Admin') }}&size=128&background=4F46E5&color=fff"
                alt="Profile" class="rounded-circle mb-4 mx-auto border border-4 border-light shadow-sm" width="128">
            <h3 class="fw-bold mb-1">Administrative Profile</h3>
            <p class="text-muted">{{ email }}</p>
            
            <div class="mt-4 pt-4 border-top">
                <div class="row g-3">
                    <div class="col-6">
                        <div class="p-3 bg-light rounded-3">
                            <span class="small text-muted d-block uppercase fw-bold mb-1">Account Role</span>
                            <span class="fw-bold text-primary">Super Administrator</span>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="p-3 bg-light rounded-3">
                            <span class="small text-muted d-block uppercase fw-bold mb-1">Security Status</span>
                            <span class="fw-bold text-success">Active & Secure</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="mt-4">
                <a href="{{ url_for('admin.change_password') }}" class="btn btn-primary rounded-pill px-4 fw-bold shadow-sm">
                    <i class="fas fa-key me-2"></i>Update Security Settings
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
