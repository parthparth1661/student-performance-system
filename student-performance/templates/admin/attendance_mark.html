{% extends 'admin/layout.html' %}

{% block content %}
<div class="card border-0 shadow-sm">
    <div class="card-header bg-white py-3 d-flex align-items-center justify-content-between">
        <div>
            <h4 class="mb-0 fw-bold">Daily Attendance Marking</h4>
            <p class="text-muted small mb-0">Select date and mark status for each student</p>
        </div>
        <form action="{{ url_for('admin.mark_attendance') }}" method="GET" class="d-flex gap-2">
            <input type="date" name="date" class="form-control" value="{{ attendance_date }}">
            <button type="submit" class="btn btn-primary px-4">Go</button>
        </form>
    </div>
    <div class="card-body">
        <form action="{{ url_for('admin.mark_attendance') }}" method="POST">
            <input type="hidden" name="attendance_date" value="{{ attendance_date }}">

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="bg-light">
                        <tr>
                            <th>Enrollment No</th>
                            <th>Name</th>
                            <th>Dept & Sem</th>
                            <th>Status</th>
                            <th>Remarks</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for s in students %}
                        <tr>
                            <td class="fw-bold">{{ s.roll_no }}</td>
                            <td>{{ s.name }}</td>
                            <td>
                                <span class="badge bg-secondary bg-opacity-10 text-secondary">{{ s.department }}</span>
                                <span class="badge bg-info bg-opacity-10 text-info">Sem {{ s.semester }}</span>
                            </td>
                            <td>
                                <input type="hidden" name="student_id" value="{{ s.student_id }}">
                                <div class="btn-group" role="group">
                                    <input type="radio" class="btn-check" name="status_{{ s.student_id }}"
                                        id="present_{{ s.student_id }}" value="Present" {{ 'checked' if
                                        s.status=='Present' }}>
                                    <label class="btn btn-outline-success btn-sm"
                                        for="present_{{ s.student_id }}">Present</label>

                                    <input type="radio" class="btn-check" name="status_{{ s.student_id }}"
                                        id="absent_{{ s.student_id }}" value="Absent" {{ 'checked' if s.status=='Absent'
                                        }}>
                                    <label class="btn btn-outline-danger btn-sm"
                                        for="absent_{{ s.student_id }}">Absent</label>
                                </div>
                            </td>
                            <td>
                                <input type="text" name="remarks_{{ s.student_id }}"
                                    class="form-control form-control-sm" placeholder="Optional" value="{{ s.remarks }}">
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>

            <div class="text-end mt-4">
                <button type="submit" class="btn btn-success px-5 py-2 shadow-sm fw-bold">
                    <i class="fas fa-save me-2"></i>Save Attendance for {{ attendance_date }}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
