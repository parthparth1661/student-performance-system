{% extends "admin/layout.html" %}

{% block content %}
<div class="container-fluid px-4">
    <h1 class="mt-4">Upload Attendance CSV</h1>
    <ol class="breadcrumb mb-4">
        <li class="breadcrumb-item"><a href="{{ url_for('admin.dashboard') }}">Dashboard</a></li>
        <li class="breadcrumb-item active">Upload Attendance</li>
    </ol>

    <div class="card mb-4">
        <div class="card-header">
            <i class="fas fa-file-csv me-1"></i>
            Upload Attendance File
        </div>
        <div class="card-body">
            <form action="{{ url_for('admin.upload_attendance') }}" method="POST" enctype="multipart/form-data">

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="department" class="form-label">Department</label>
                        <select name="department" id="department" class="form-select" required>
                            <option value="">Select Department</option>
                            {% for dept in departments %}
                            <option value="{{ dept }}">{{ dept }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="semester" class="form-label">Semester</label>
                        <select name="semester" id="semester" class="form-select" required>
                            <option value="">Select Semester</option>
                            {% for sem in semesters %}
                            <option value="{{ sem }}">{{ sem }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="file" class="form-label">Select CSV File</label>
                    <input class="form-control" type="file" id="file" name="file" accept=".csv" required>
                    <div class="form-text text-muted">
                        Format: <strong>roll_no, attendance_date, status, remarks</strong><br>
                        Rules: Date must be within academic term, not Sunday, not Holiday.
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-upload me-1"></i> Upload & Process
                    </button>
                    <a href="{{ url_for('admin.dashboard') }}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
