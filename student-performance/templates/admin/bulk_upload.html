{% extends 'admin/layout.html' %}

{% block content %}
<div class="row mb-4 align-items-center">
    <div class="col-md-8">
                            </div>
                            <div class="col-md-4">
                                <div class="p-3 bg-white border rounded-3 h-100 shadow-sm">
                                    <div class="fw-bold text-success mb-2 small">PERFORMANCE MARKS</div>
                                    <code class="text-muted" style="font-size: 0.7rem;">enrollment_no, subject_id,<br>exam_type, marks_obtained</code>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="p-3 bg-white border rounded-3 h-100 shadow-sm">
                                    <div class="fw-bold text-warning mb-2 small">ATTENDANCE LOGS</div>
                                    <code class="text-muted" style="font-size: 0.7rem;">enrollment_no, subject_id,<br>date, status</code>
                                </div>
                            </div>
                        </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary py-3 rounded-3 fw-bold shadow-lg">
                            <i class="fas fa-rocket me-2"></i>Execute Batch Import Process
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    .border-dashed {
        border: 2px dashed #dfe6e9;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .border-dashed:hover {
        border-color: var(--primary-color);
        background: #f1f0ff !important;
        transform: translateY(-2px);
    }
    .upload-area {
        cursor: pointer;
    }
    .letter-spacing-1 {
        letter-spacing: 1px;
    }
</style>
{% endblock %}
