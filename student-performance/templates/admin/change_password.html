{% extends 'admin/layout.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-0 shadow-sm rounded-4 p-5">
            <h4 class="fw-bold mb-3"><i class="fas fa-lock me-2 text-warning"></i>Change Administrator Password</h4>
            <p class="text-muted small mb-4">Ensure your account remains safe. Use a mix of characters and numbers.</p>
            
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold small text-muted">Current Password</label>
                    <input type="password" name="old_password" class="form-control border-light bg-light rounded-pill px-4" placeholder="••••••••" required>
                </div>
                <hr class="my-4 border-light">
                <div class="mb-3">
                    <label class="form-label fw-bold small text-muted">New Password</label>
                    <input type="password" name="new_password" class="form-control border-light bg-light rounded-pill px-4" placeholder="••••••••" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold small text-muted">Confirm New Password</label>
                    <input type="password" class="form-control border-light bg-light rounded-pill px-4" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-warning w-100 py-2 rounded-pill fw-bold shadow-sm">
                    <i class="fas fa-shield-alt me-2"></i>Update Security Credentials
                </button>
                <a href="{{ url_for('admin.profile') }}" class="btn btn-link w-100 text-decoration-none mt-2 small text-muted">
                    Cancel and Return
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
