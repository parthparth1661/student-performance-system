{% extends "admin/layout.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-header bg-white border-0 py-3">
                <h5 class="mb-0 fw-bold text-danger"><i class="fas fa-lock me-2"></i>Change Password</h5>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('admin.change_password') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label text-muted fw-medium">Current Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i
                                    class="fas fa-key text-muted"></i></span>
                            <input type="password" class="form-control border-start-0 ps-0" name="current_password"
                                required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted fw-medium">New Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i
                                    class="fas fa-lock text-muted"></i></span>
                            <input type="password" class="form-control border-start-0 ps-0" name="new_password"
                                required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-muted fw-medium">Confirm New Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i
                                    class="fas fa-check-circle text-muted"></i></span>
                            <input type="password" class="form-control border-start-0 ps-0" name="confirm_password"
                                required>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center">
                        <a href="{{ url_for('admin.profile') }}" class="btn btn-outline-secondary rounded-3">
                            <i class="fas fa-arrow-left me-1"></i> Back
                        </a>
                        <button type="submit" class="btn btn-danger px-4 rounded-3">
                            <i class="fas fa-save me-2"></i>Update Password
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
