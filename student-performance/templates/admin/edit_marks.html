{% extends 'admin/layout.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card border-0 shadow-sm overflow-hidden">
            <div class="card-header bg-white py-3 border-0">
                <div class="d-flex align-items-center justify-content-between">
                    <div class="d-flex align-items-center">
                        <div class="icon-shape bg-warning bg-opacity-10 text-warning rounded-3 p-3 me-3">
                            <i class="fas fa-edit"></i>
                        </div>
                        <div>
                            <h5 class="mb-0 fw-bold">Edit Mark Record</h5>
                            <p class="text-muted small mb-0">Update performance data for <strong>{{ mark.name
                                    }}</strong>.</p>
                        </div>
                    </div>
                    <span class="badge bg-light text-secondary border">Roll: {{ mark.roll_no }}</span>
                </div>
            </div>
            <div class="card-body p-4 pt-2">
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Subject</label>
                            <select name="subject" class="form-select text-muted" required>
                                {% for subject in subjects %}
                                <option value="{{ subject }}" {{ 'selected' if mark.subject==subject }}>{{ subject }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Marks (0-100)</label>
                            <input type="number" name="marks" class="form-control" required min="0" max="100"
                                value="{{ mark.marks }}">
                        </div>
                    </div>
                    <div class="row g-3 mt-2">
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Exam Type</label>
                            <select name="exam_type" class="form-select text-muted" required>
                                <option value="Internal" {{ 'selected' if mark.exam_type=='Internal' }}>Internal
                                </option>
                                <option value="External" {{ 'selected' if mark.exam_type=='External' }}>External
                                </option>
                                <option value="Practical" {{ 'selected' if mark.exam_type=='Practical' }} {{ 'disabled'
                                    if mark.department=='MBA' }}>Practical</option>
                            </select>
                            {% if mark.department == 'MBA' %}
                            <small class="text-danger">Practical not allowed for MBA</small>
                            {% endif %}
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Exam Date</label>
                            <input type="date" name="exam_date" class="form-control" required
                                value="{{ mark.exam_date }}">
                        </div>
                    </div>
                    <div class="mt-4 pt-3 d-flex gap-2">
                        <button type="submit" class="btn btn-warning px-4 py-2 text-dark fw-bold">
                            <i class="fas fa-check-circle me-2"></i>Update Record
                        </button>
                        <a href="{{ url_for('admin.view_marks') }}" class="btn btn-light px-4 py-2 text-secondary">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
