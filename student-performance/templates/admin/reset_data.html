{% extends 'admin/layout.html' %}

                    <div class="mb-2 text-start">

                        <input type="text" name="confirmation_code" id="confirmation_code"
                            class="form-control form-control-lg border-danger text-center fw-bold" placeholder="RESET"
                            required autocomplete="off">
                    </div>
                    <button type="submit" class="btn btn-danger py-3 fw-bold rounded-pill shadow-sm">

                    </button>
                    <a href="{{ url_for('admin.dashboard') }}" class="btn btn-light py-3 fw-bold rounded-pill">
                        Cancel and Go Back
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
