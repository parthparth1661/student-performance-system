{% extends 'admin/layout.html' %}

{% block page_title %}Administrative Settings{% endblock %}

{% block content %}
<div class="row g-4">
    <!-- 👤 ADMIN PROFILE SECTOR -->
    <div class="col-lg-6">
        <div class="card border-0 shadow-sm rounded-4 bg-white overflow-hidden transition-hover">
            <div class="card-header bg-white border-0 p-4">
                <div class="d-flex align-items-center">
                    <div class="bg-primary-subtle text-primary p-3 rounded-circle me-3">
                        <i class="fas fa-user-cog fs-4"></i>
                    </div>
                    <div>
                        <h5 class="fw-bold text-dark m-0">Admin Identity Profile</h5>
                        <p class="extra-small text-muted m-0">Manage your institutional identity controls</p>
                    </div>
                </div>
            </div>
            <div class="card-body p-4 pt-0">
                <form action="{{ url_for('admin.update_profile') }}" method="POST" class="row g-3">
                    <div class="col-12">
                        <label class="form-label extra-small fw-bold text-uppercase text-muted">Full Name</label>
                        <input type="text" name="name" class="form-control border-0 bg-light rounded-3 py-2" value="{{ admin.name or '' }}" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label extra-small fw-bold text-uppercase text-muted">Official Email Address</label>
                        <input type="email" name="email" class="form-control border-0 bg-light rounded-3 py-2" value="{{ admin.email }}" required>
                    </div>
                    <div class="col-12 mt-4">
                        <button type="submit" class="btn btn-primary w-100 rounded-3 fw-bold py-2 shadow-sm transition-hover">
                            <i class="fas fa-save me-2"></i>Update Identity Profile
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 🔐 SECURITY & CREDENTIALS SECTOR -->
    <div class="col-lg-6">
        <div class="card border-0 shadow-sm rounded-4 bg-white overflow-hidden transition-hover">
            <div class="card-header bg-white border-0 p-4">
                <div class="d-flex align-items-center">
                    <div class="bg-danger-subtle text-danger p-3 rounded-circle me-3">
                        <i class="fas fa-shield-alt fs-4"></i>
                    </div>
                    <div>
                        <h5 class="fw-bold text-dark m-0">Security & Authentication</h5>
                        <p class="extra-small text-muted m-0">Update your account access credentials</p>
                    </div>
                </div>
            </div>
            <div class="card-body p-4 pt-0">
                <form action="{{ url_for('admin.change_password') }}" method="POST" class="row g-3">
                    <div class="col-12">
                        <label class="form-label extra-small fw-bold text-uppercase text-muted">Current Verification Password</label>
                        <input type="password" name="current_password" class="form-control border-0 bg-light rounded-3 py-2" placeholder="••••••••" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label extra-small fw-bold text-uppercase text-muted">New Security Password</label>
                        <input type="password" name="new_password" class="form-control border-0 bg-light rounded-3 py-2" placeholder="••••••••" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label extra-small fw-bold text-uppercase text-muted">Confirm New Password</label>
                        <input type="password" name="confirm_password" class="form-control border-0 bg-light rounded-3 py-2" placeholder="••••••••" required>
                    </div>
                    <div class="col-12 mt-4">
                        <button type="submit" class="btn btn-dark w-100 rounded-3 fw-bold py-2 shadow-sm transition-hover">
                            <i class="fas fa-key me-2"></i>Secure Update Password
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
.bg-primary-subtle { background: rgba(99, 102, 241, 0.1); }
.bg-danger-subtle { background: rgba(239, 68, 68, 0.1); }
.extra-small { font-size: 0.75rem; }
.transition-hover { transition: transform 0.3s ease, box-shadow 0.3s ease; }
.transition-hover:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.08) !important; }
.form-control:focus { background: white !important; border: 1px solid #6366f1 !important; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }
</style>
{% endblock %}
