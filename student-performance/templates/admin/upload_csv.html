{% extends 'admin/layout.html' %}

{% block content %}
                        id="drop-zone">
                        <i class="fas fa-cloud-upload-alt fa-3x text-primary opacity-25 mb-3"></i>
                        <h6 class="fw-bold mb-1">Click to select or drag and drop</h6>
                        <p class="text-muted small mb-3">Only .CSV files are supported</p>
                        <input class="form-control d-none" type="file" id="file" name="file" accept=".csv" required>
                        <button type="button" class="btn btn-primary px-4"
                            onclick="document.getElementById('file').click()">
                            Browse Files
                        </button>
                        <div id="file-name" class="mt-3 text-success fw-bold small d-none"></div>
                    </div>

                    <div class="d-grid">
                        <button type="submit"
                            class="btn btn-primary btn-lg py-3 rounded-3 shadow-sm border-0 bg-gradient-primary">
                            <i class="fas fa-check-circle me-2"></i>Process and Import Data
                        </button>
                    </div>
                </form>

                <div class="mt-4 text-center">
                    <a href="{{ url_for('admin.dashboard') }}"
                        class="btn btn-link text-decoration-none text-muted small">
                        <i class="fas fa-arrow-left me-1"></i> Back to Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('file').onchange = function () {
        if (this.files.length > 0) {
            document.getElementById('file-name').textContent = 'Selected: ' + this.files[0].name;
            document.getElementById('file-name').classList.remove('d-none');
            document.getElementById('drop-zone').classList.add('bg-white');
            document.getElementById('drop-zone').classList.remove('bg-light');
        }
    };
</script>
{% endblock %}
