{% extends 'admin/layout.html' %}

{% block page_title %}<i class="bi bi-journal-check me-2"></i>Academic Marks Ledger{% endblock %}

{% block content %}
<div class="container-fluid py-4">

    <!-- 🚀 HEADER: Operational Context & Bulk Ingestion -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold mb-1 text-dark">Institutional Performance Registry</h4>
            <p class="text-muted small mb-0">Manage and synchronize student academic outcomes</p>
        </div>
        <div class="d-flex gap-3 align-items-center">
            <!-- Institutional Bulk Data Gateway -->
            <form action="{{ url_for('admin.bulk_upload') }}" method="POST" enctype="multipart/form-data"
                 class="d-flex gap-2 align-items-center bg-white p-2 rounded-3 shadow-sm border">
                <input type="file" name="file" accept=".csv" class="form-control form-control-sm border-0 bg-light"
                    style="max-width: 180px;" required>
                <button type="submit" class="btn btn-primary btn-sm rounded-2 px-3 fw-bold">
                    <i class="bi bi-cloud-upload me-1"></i>Bulk Sync
                </button>
            </form>
            <a href="{{ url_for('admin.add_marks') }}" class="btn btn-primary shadow-sm rounded-3 px-3 py-2 fw-bold">
                <i class="bi bi-plus-lg me-2"></i>New Entry
            </a>
        </div>
    </div>

    <!-- 🔍 ANALYTICAL FILTERS: Performance Matrix Configuration -->
    <div class="card border-0 shadow-sm rounded-3 mb-4">
        <div class="card-body p-3">
            <form method="GET" class="row g-3 align-items-end">
                <!-- ID Vector -->
                <div class="col-md-2">
                    <label class="form-label extra-small fw-bold text-uppercase text-muted mb-1 ls-1">Identity ID</label>
                    <input type="text" name="enrollment" class="form-control form-control-sm border-0 bg-light rounded-2" 
                           placeholder="Enrollment..." value="{{ filters.enrollment or '' }}">
                </div>
                <!-- Dept Vector -->
                <div class="col-md-2">
                    <label class="form-label extra-small fw-bold text-uppercase text-muted mb-1 ls-1">Dept</label>
                    <select name="department" class="form-select form-select-sm border-0 bg-light rounded-2">
                        <option value="All">Global</option>
                        <option value="BCA" {{ 'selected' if filters.department == 'BCA' }}>BCA</option>
                        <option value="MCA" {{ 'selected' if filters.department == 'MCA' }}>MCA</option>
                    </select>
                </div>
                <!-- Sem Vector -->
                <div class="col-md-2">
                    <label class="form-label extra-small fw-bold text-uppercase text-muted mb-1 ls-1">Sem</label>
                    <select name="semester" class="form-select form-select-sm border-0 bg-light rounded-2">
                        <option value="All">Global</option>
                        {% for i in range(1, 9) %}
                        <option value="{{ i }}" {{ 'selected' if filters.semester|string == i|string }}>Sem {{ i }}</option>
                        {% endfor %}
                    </select>
                </div>
                <!-- Module Vector -->
                <div class="col-md-3">
                    <label class="form-label extra-small fw-bold text-uppercase text-muted mb-1 ls-1">Academic Module</label>
                    <select name="subject_id" class="form-select form-select-sm border-0 bg-light rounded-2">
                        <option value="All">All Modules</option>
                        {% for sub in subjects %}
                    class="card-body p-3 border-start border-primary border-4 rounded-3 d-flex flex-column justify-content-center">
                    <div class="extra-small fw-bold text-uppercase text-muted ls-1">Evaluated</div>
                    <div class="fs-4 fw-bold text-dark mt-1">{{ stats.total_entries or 0 }}</div>
                    <div class="extra-small text-muted">Total Students</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm rounded-3 transition-hover h-100">
                <div
                    class="card-body p-3 border-start border-success border-4 rounded-3 d-flex flex-column justify-content-center">
                    <div class="extra-small fw-bold text-uppercase text-muted ls-1">Average Marks</div>
                    <div class="fs-4 fw-bold text-dark mt-1">{{ "%.1f"|format(stats.avg_marks or 0) }}%</div>
                    <div class="extra-small text-muted">Performance Mean</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm rounded-3 transition-hover h-100">
                <div
                    class="card-body p-3 border-start border-warning border-4 rounded-3 d-flex flex-column justify-content-center">
                    <div class="extra-small fw-bold text-uppercase text-muted ls-1">Highest Marks</div>
                    <div class="fs-4 fw-bold text-dark mt-1">{{ stats.top_score or 0 }}</div>
                    <div class="extra-small text-muted">Peak Academic Score</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm rounded-3 transition-hover h-100">
                <div
                    class="card-body p-3 border-start border-info border-4 rounded-3 d-flex flex-column justify-content-center">
                    <div class="extra-small fw-bold text-uppercase text-muted ls-1">Pass Percentage</div>
                    <div class="fs-4 fw-bold text-dark mt-1">
                        {% if stats.total_entries > 0 %}
                        {{ "%.1f"|format(stats.pass_count / stats.total_entries * 100) }}%
                        {% else %}0%{% endif %}
                    </div>
                    <div class="extra-small text-muted">Overall Success Rate</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 📈 3. PERFORMANCE OVERVIEW (CHARTS) -->
    <div class="card border-0 shadow-sm rounded-3 mb-4">
        <div class="card-body p-4">
            <h6 class="fw-bold mb-3 text-dark">Performance Overview</h6>
            <div style="height: 300px;">
                <canvas id="marksChart"></canvas>
            </div>
        </div>
    </div>

    <!-- 📋 4. MARKS DETAILED TABLE -->
    <div class="card border-0 shadow-sm rounded-3 overflow-hidden">
        <div class="table-responsive">
            <table class="table table-striped table-hover align-middle mb-0 text-center">
                <thead class="bg-light">
                    <tr class="text-secondary extra-small text-uppercase fw-bold text-center">
                        <th class="ps-4 py-3 text-start">Student Name</th>
                        <th class="py-3">Enrollment</th>
                        <th class="py-3">Subject</th>
                        <th class="py-3">Int. (30)</th>
                        <th class="py-3">Viva (20)</th>
                        <th class="py-3">Ext. (50)</th>
                        <th class="py-3">Total</th>
                        <th class="py-3">Result</th>
                        <th class="py-3 text-center pe-4">Manage</th>
                    </tr>
                </thead>
                <tbody>
                    {% for m in marks_list %}
                    <tr>
                        <td class="ps-4 py-3 text-start">
                            <div class="fw-bold text-dark fs-6">{{ m.student_name }}</div>
                            <div class="text-muted extra-small">{{ m.department }} | Sem {{ m.semester }}</div>
                        </td>
                        <td>
                            <span class="badge bg-light border text-primary rounded-pill px-3">{{ m.enrollment_no
                                }}</span>
                        </td>
                        <td class="small fw-semibold">{{ m.subject_name }}</td>
                        <td class="fw-medium text-muted small">{{ m.internal_marks }}</td>
                        <td class="fw-medium text-muted small">{{ m.viva_marks }}</td>
                        <td class="fw-medium text-muted small">{{ m.external_marks }}</td>
                        <td class="fw-bold text-dark">{{ m.total_marks }}</td>
                        <td>
                            <span class="badge {% if m.total_marks >= 40 %}bg-success{% else %}bg-danger{% endif %} rounded-pill px-3">
                                {% if m.total_marks >= 40 %}Pass{% else %}Fail{% endif %}
                            </span>
                        </td>
                        <td class="text-center pe-4">
                            <div class="d-flex justify-content-center gap-2">
                                <a href="{{ url_for('admin.edit_marks', marks_id=m.id) }}"
                                    class="btn btn-sm btn-outline-primary rounded-2 px-3 fw-bold">
                                    <i class="bi bi-pencil me-1"></i>Edit
                                </a>
                                <a href="{{ url_for('admin.delete_marks', marks_id=m.id) }}"
                                    class="btn btn-sm btn-outline-danger rounded-2 px-3 fw-bold"
                                    onclick="return confirm('Are you sure you want to delete this record?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="7" class="text-center py-5 text-muted small">No performance records matches the
                            current selection matrix.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <!-- 📄 PAGINATION MATRIX -->
    {% if total_pages > 1 %}
    <div class="d-flex justify-content-between align-items-center mt-4 px-2">
        <div class="small text-muted fw-bold text-uppercase ls-1">Page {{ page }} of {{ total_pages }}</div>
        <nav>
            <ul class="pagination pagination-sm mb-0 gap-2">
                {% if page > 1 %}
                <li class="page-item"><a class="page-link border-0 rounded-3 shadow-sm px-3 py-2 bg-white"
                        href="{{ url_for('admin.view_marks', page=page-1, **filters) }}"><i
                            class="bi bi-chevron-left text-primary"></i></a></li>
                {% endif %}

                <li class="page-item active">
                    <span class="page-link border-0 rounded-3 shadow-sm px-3 py-2 bg-primary text-white">{{ page
                        }}</span>
                </li>

                {% if page < total_pages %} <li class="page-item"><a
                        class="page-link border-0 rounded-3 shadow-sm px-3 py-2 bg-white"
                        href="{{ url_for('admin.view_marks', page=page+1, **filters) }}"><i
                            class="bi bi-chevron-right text-primary"></i></a></li>
                    {% endif %}
            </ul>
        </nav>
    </div>
    {% endif %}
</div>

<!-- 📊 CHART.JS INTEGRATION -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const ctx = document.getElementById('marksChart').getContext('2d');
        const chartData = JSON.parse('{{ chart_data | tojson | safe }}');

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: chartData.labels,
                datasets: [{
                    label: 'Average Score (%)',
                    data: chartData.values,
                    backgroundColor: 'rgba(99, 102, 241, 0.65)',
                    borderColor: 'rgb(99, 102, 241)',
                    borderWidth: 1.5,
                    borderRadius: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100,
                        grid: { color: 'rgba(0,0,0,0.05)', drawBorder: false }
                    },
                    x: {
                        grid: { display: false }
                    }
                },
                plugins: {
                    legend: { display: false }
                }
            }
        });
    });
</script>

<style>
    .ls-1 {
        letter-spacing: 0.1em;
    }

    .extra-small {
        font-size: 0.75rem;
    }

    .transition-hover {
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .transition-hover:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 24px -6px rgba(0, 0, 0, 0.12) !important;
    }

    .table-striped>tbody>tr:nth-of-type(odd) {
        --bs-table-accent-bg: rgba(0, 0, 0, 0.015);
    }

    .page-link:hover {
        background-color: #f8f9fa !important;
        color: var(--bs-primary) !important;
    }
</style>
{% endblock %}
