<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - SPDA</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
        }
    </style>
</head>

<body>

    <div class="card bg-white border-0">
        <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
                <div class="avatar bg-warning bg-opacity-10 text-warning rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
                    style="width: 60px; height: 60px;">
                    <i class="fas fa-key fa-2x"></i>
                </div>
                <h4 class="fw-bold">Change Password</h4>
                <p class="text-muted small">
                    For security reasons, you must change your default password before proceeding.
                </p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form action="{{ url_for('student.change_password') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold small text-muted">NEW PASSWORD</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control" name="new_password" required minlength="8"
                            placeholder="Min 8 characters">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold small text-muted">CONFIRM PASSWORD</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="fas fa-check-circle"></i></span>
                        <input type="password" class="form-control" name="confirm_password" required
                            placeholder="Re-enter password">
                    </div>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary fw-bold py-2">
                        Update Password & Continue
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
