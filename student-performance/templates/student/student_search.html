{% extends "student/layout.html" %}

{% block title %}Verify Identity - SPDA{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="col-md-5">
        <div class="glass-card text-center p-5">
            <div class="profile-img mx-auto mb-4">
                <i class="fas fa-user-graduate"></i>
            </div>
            <h2 class="fw-bold mb-2">Student Login</h2>
            <p class="text-secondary mb-4">Enter your enrollment number to access your performance dashboard.</p>

            <form method="POST">
                <div class="mb-4">
                    <input type="text" name="enrollment_no"
                        class="form-control form-control-lg bg-dark text-white border-secondary"
                        placeholder="Ex: 123456789" required style="background: rgba(0,0,0,0.2) !important;">
                </div>
                <button type="submit" class="btn btn-glass w-100 py-3 fw-bold">
                    <i class="fas fa-chart-line me-2"></i> View Dashboard
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
